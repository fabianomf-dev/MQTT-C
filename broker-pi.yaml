# ============================================================
# 🚀 Deployment — broker-pi
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker-pi
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broker-pi
  template:
    metadata:
      labels:
        app: broker-pi
    spec:
      serviceAccountName: broker-pi-admin

      containers:
        - name: broker-pi
          image: broker-pi:latest
          imagePullPolicy: IfNotPresent

          # ============================
          # 🌍 Variáveis de ambiente
          # ============================
          env:

            # --- MQTT ---
            - name: MQTT_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: MQTT_HOST

            - name: MQTT_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: MQTT_PORT

            - name: MQTT_USER
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: MQTT_USER

            - name: MQTT_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: MQTT_PASS

            # --- Tópicos ---
            - name: TOPIC_PUB
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: TOPIC_PUB

            - name: TOPIC_SUB
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: TOPIC_SUB

            # --- API --- (corrigido: eram secretKeyRef por engano)
            - name: API_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: API_PORT

            - name: PI_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: PI_TIMEOUT

            # --- JWT ---
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: JWT_SECRET

          # ============================
          # 🚪 Portas
          # ============================
          ports:
            - name: http
              containerPort: 8008

          # ============================
          # ⚙️ Recursos
          # ============================
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"

---
# ============================================================
# 🌐 Service — NodePort 30808
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: broker-pi
spec:
  selector:
    app: broker-pi
  ports:
    - name: http
      port: 8008
      targetPort: 8008
      nodePort: 30808
  type: NodePort